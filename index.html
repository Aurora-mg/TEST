    <title>🍽️ 客官不可以 · 云同步版</title>

    <!-- 原有的HTML结构保持不变，直接复制你之前的body内容 -->
    <div class="container">
        <!-- ... 所有HTML内容 ... -->
    </div>

    <script>
        // ==================== 云开发初始化 ====================
        const envId = 'aurora-593-6gbm2ztz2fac01fd'; // ⚠️ 替换成你的环境ID
        
        // 初始化云开发
        const app = tcb.init({
            env: envId
        });
        const db = app.database();
        const auth = app.auth();

        // 当前用户ID
        let currentUserId = null;

        // ==================== 用户登录 ====================
        async function initAuth() {
            try {
                // 尝试获取当前登录状态
                const loginState = await auth.getLoginState();
                
                if (loginState) {
                    // 已经登录
                    currentUserId = loginState.user.uid;
                    console.log('✅ 已登录用户:', currentUserId);
                } else {
                    // 未登录，进行匿名登录
                    const res = await auth.signInAnonymously();
                    currentUserId = res.uid;
                    console.log('✅ 匿名登录成功:', currentUserId);
                }
                
                // 登录成功后加载数据
                await loadAllData();
                
            } catch (err) {
                console.error('❌ 登录失败:', err);
                alert('登录失败，请刷新重试');
            }
        }

        // ==================== 数据加载 ====================
        async function loadAllData() {
            try {
                // 1. 加载食堂列表
                const locationsRes = await db.collection('locations').get();
                if (locationsRes.data.length > 0) {
                    window.locations = locationsRes.data;
                } else {
                    // 如果没有数据，使用默认数据并导入
                    window.locations = defaultLocations;
                    await importDefaultData();
                }

                // 2. 加载菜品数据
                const foodMenusRes = await db.collection('food_menus').get();
                window.foodMenus = {};
                foodMenusRes.data.forEach(item => {
                    if (!window.foodMenus[item.locationId]) {
                        window.foodMenus[item.locationId] = [];
                    }
                    window.foodMenus[item.locationId].push(item.name);
                });

                // 3. 加载评分数据
                const foodRatingsRes = await db.collection('food_ratings').get();
                window.publicFoodRatings = {};
                foodRatingsRes.data.forEach(rating => {
                    if (!window.publicFoodRatings[rating.itemId]) {
                        window.publicFoodRatings[rating.itemId] = {};
                    }
                    window.publicFoodRatings[rating.itemId][rating.userId] = rating.rating;
                });

                // 4. 加载点评数据
                const foodReviewsRes = await db.collection('food_reviews').get();
                window.publicFoodReviews = {};
                foodReviewsRes.data.forEach(review => {
                    if (!window.publicFoodReviews[review.itemId]) {
                        window.publicFoodReviews[review.itemId] = [];
                    }
                    window.publicFoodReviews[review.itemId].push({
                        userId: review.userId,
                        text: review.text,
                        time: review.time
                    });
                });

                // 重新渲染界面
                renderAll();
                
                // 建立实时监听
                setupRealtimeListeners();
                
            } catch (err) {
                console.error('❌ 加载数据失败:', err);
            }
        }

        // ==================== 实时监听 ====================
        function setupRealtimeListeners() {
            // 监听菜品变化
            db.collection('food_menus').watch({
                onChange: (snapshot) => {
                    snapshot.docChanges.forEach(change => {
                        if (change.docType === 'add') {
                            // 有新菜品添加，更新本地数据
                            const item = change.data;
                            if (!window.foodMenus[item.locationId]) {
                                window.foodMenus[item.locationId] = [];
                            }
                            if (!window.foodMenus[item.locationId].includes(item.name)) {
                                window.foodMenus[item.locationId].push(item.name);
                            }
                        }
                    });
                    renderFoodMenu();
                    showNotification('📢 菜单已更新');
                },
                onError: (err) => console.error('监听失败:', err)
            });

            // 监听评分变化
            db.collection('food_ratings').watch({
                onChange: (snapshot) => {
                    snapshot.docChanges.forEach(change => {
                        if (change.docType === 'add') {
                            const rating = change.data;
                            if (!window.publicFoodRatings[rating.itemId]) {
                                window.publicFoodRatings[rating.itemId] = {};
                            }
                            window.publicFoodRatings[rating.itemId][rating.userId] = rating.rating;
                        }
                    });
                    renderFoodMenu();
                },
                onError: (err) => console.error('监听失败:', err)
            });
        }

        // ==================== 数据写入函数 ====================
        // 添加新菜品
        window.addFoodItem = async function() {
            const input = document.getElementById('newFoodItem');
            const newItem = input.value.trim();
            if (!newItem) return;

            try {
                await db.collection('food_menus').add({
                    locationId: currentFoodLocation,
                    name: newItem,
                    userId: currentUserId,
                    createdAt: new Date().toISOString()
                });
                input.value = '';
                showNotification('✅ 已添加到云端，大家都能看到');
            } catch (err) {
                console.error('添加失败:', err);
                showNotification('❌ 添加失败');
            }
        };

        // 提交评分
        window.rateItem = async function(itemId, type, rating) {
            try {
                // 检查是否已经评过分
                const existing = await db.collection(`${type}_ratings`)
                    .where({
                        itemId: itemId,
                        userId: currentUserId
                    }).get();

                if (existing.data.length > 0) {
                    // 更新评分
                    await db.collection(`${type}_ratings`)
                        .doc(existing.data[0]._id)
                        .update({ rating });
                } else {
                    // 新增评分
                    await db.collection(`${type}_ratings`).add({
                        itemId: itemId,
                        userId: currentUserId,
                        rating: rating,
                        createdAt: new Date().toISOString()
                    });
                }
                showNotification('⭐ 评分已提交');
            } catch (err) {
                console.error('评分失败:', err);
            }
        };

        // 发表点评
        window.submitReview = async function(itemId, type) {
            const input = document.getElementById(`review_${itemId}`);
            const review = input.value.trim();
            if (!review) return;

            try {
                await db.collection(`${type}_reviews`).add({
                    itemId: itemId,
                    userId: currentUserId,
                    text: review,
                    time: new Date().toISOString()
                });
                input.value = '';
                showNotification('💬 点评已发表');
            } catch (err) {
                console.error('点评失败:', err);
            }
        };

        // ==================== 导入默认数据 ====================
        async function importDefaultData() {
            // 导入食堂
            for (let loc of defaultLocations) {
                await db.collection('locations').add(loc);
            }
            
            // 导入默认菜品
            for (let [locationId, items] of Object.entries(defaultFoodMenus)) {
                for (let name of items) {
                    await db.collection('food_menus').add({
                        locationId,
                        name,
                        userId: 'system',
                        createdAt: new Date().toISOString()
                    });
                }
            }
            
            // 导入默认饮料
            for (let [categoryId, items] of Object.entries(defaultDrinkMenus)) {
                for (let name of items) {
                    await db.collection('drink_menus').add({
                        categoryId,
                        name,
                        userId: 'system',
                        createdAt: new Date().toISOString()
                    });
                }
            }
            
            // 导入饮料分类
            for (let cat of defaultDrinkCategories) {
                await db.collection('drink_categories').add(cat);
            }
        }

        function renderAll() {
            // 在这里调用你之前的所有渲染函数

    </script>
